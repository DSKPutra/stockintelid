# Render Blueprint — deploy StockIntelID sebagai satu web service (Docker).
# Cara pakai: Render Dashboard → New + → Blueprint → connect repo DSKPutra/stockintelid.
services:
  - type: web
    name: stockintelid
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/stocks
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Penyedia harga: mock (default, tanpa kredensial). Ganti ke 'api' + isi
      # PRICE_API_BASE_URL/PRICE_API_KEY bila punya lisensi vendor realtime.
      - key: PRICE_PROVIDER
        value: mock
      # LLM chatbot opsional — isi di dashboard Render bila ingin LLM nyata.
      # - key: LLM_PROVIDER
      #   value: anthropic
      # - key: LLM_API_KEY
      #   sync: false
