# =============================================================================
# Infrastruktur lokal untuk M2+ (data inti relasional & time-series).
# M1 berjalan tanpa ini (provider data mock in-memory). Aktifkan saat siap:
#   docker compose up -d
# =============================================================================
services:
  # PostgreSQL + TimescaleDB: master data relasional + OHLCV time-series.
  db:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: idx-db
    environment:
      POSTGRES_USER: idx
      POSTGRES_PASSWORD: idx
      POSTGRES_DB: idx
    ports:
      - '5432:5432'
    volumes:
      - idx-db-data:/var/lib/postgresql/data
      - ./infra/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U idx -d idx']
      interval: 5s
      timeout: 5s
      retries: 10

  # Redis: cache (TTL berbeda per jenis data) + rate-limit.
  redis:
    image: redis:7.4-alpine
    container_name: idx-redis
    ports:
      - '6379:6379'
    volumes:
      - idx-redis-data:/data

volumes:
  idx-db-data:
  idx-redis-data:
